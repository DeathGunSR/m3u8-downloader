name: Download & Encrypt Multiple M3U8 (Parts + Password)

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: 'لینک تکی (در صورت نیاز)'
        required: false
        default: ''
        type: string
      url_list:
        description: 'لیست لینک‌ها با کاما (,) جدا کنید. مثال: https://a.m3u8,https://b.m3u8'
        required: false
        default: ''
        type: string
      archive_name:
        description: 'پیشوند نام پوشه‌ها و فایل‌ها (مثلاً myvid)'
        required: true
        type: string
      password:
        description: 'رمز مشترک فایل ZIP'
        required: true
        type: string
      part_size_mb:
        description: 'حجم هر پارت (مگابایت) - پیش‌فرض 45'
        required: false
        default: '45'
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies (ffmpeg & zip)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip

      - name: Prepare URL list
        id: prepare
        run: |
          # اگر لیست با کاما پر شده باشد، آن را به خطوط تبدیل می‌کنیم
          if [ -n "${{ github.event.inputs.url_list }}" ]; then
            echo "${{ github.event.inputs.url_list }}" | tr ',' '\n' > urls.txt
          elif [ -n "${{ github.event.inputs.m3u8_url }}" ]; then
            echo "${{ github.event.inputs.m3u8_url }}" > urls.txt
          else
            echo "هیچ لینکی ارائه نشده است!" >&2
            exit 1
          fi

      - name: Download and encrypt each video
        run: |
          PREFIX="${{ github.event.inputs.archive_name }}"
          SIZE_MB="${{ github.event.inputs.part_size_mb }}"
          PASS="${{ github.event.inputs.password }}"

          index=1
          while IFS= read -r url || [ -n "$url" ]; do
            # نادیده گرفتن خطوط خالی (مثلاً اگر کاربر دو کاما پشت هم بزند)
            [ -z "$url" ] && continue

            echo "====================================="
            echo "پردازش لینک شماره $index: $url"
            echo "====================================="

            FOLDER_NAME="${PREFIX}_${index}"
            mkdir -p "$FOLDER_NAME"

            TEMP_MP4="temp_${index}.mp4"

            # دانلود با ffmpeg
            ffmpeg -protocol_whitelist file,http,https,tcp,tls,crypto \
                   -i "$url" \
                   -c copy \
                   -bsf:a aac_adtstoasc \
                   "$TEMP_MP4"

            # انتقال فایل به پوشه و ساخت آرشیو رمزدار پارت‌بندی‌شده
            mv "$TEMP_MP4" "$FOLDER_NAME/"
            cd "$FOLDER_NAME"
            zip -P "$PASS" -s ${SIZE_MB}m -r "${FOLDER_NAME}.zip" "$TEMP_MP4"
            rm "$TEMP_MP4"
            cd ..

            echo "پوشه $FOLDER_NAME با موفقیت ساخته شد."
            index=$((index + 1))
          done < urls.txt

      - name: Commit all folders to repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: '📁 Add encrypted video parts (multiple)'
          file_pattern: '${{ github.event.inputs.archive_name }}_*'
